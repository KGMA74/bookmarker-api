spring:
  application:
    name: bookmarker-api
  profiles:
    active: dev, test

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookmarker_db}
    username: ${DB_USERNAME:username}
    password: ${DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    user: ${FLYWAY_USER:${DB_USERNAME:username}}
    password: ${FLYWAY_PASSWORD:${DB_PASSWORD:password}}
    locations: classpath:db/migration/{vendor}
